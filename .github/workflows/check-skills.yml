name: check-skills

# Lightweight drift guard: validate every SKILL.md's structure, and — when the
# hiloop CLI is installable — that every `hiloop …` command the skills mention
# still exists in the CLI (parsed live from `hiloop --help`). Runs on changes
# and weekly, so CLI drift is caught even when nobody touches this repo.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Best-effort: install the hiloop CLI so the command-existence layer runs.
      # If the installer isn't reachable yet, the step is skipped and the script
      # falls back to structure-only checks (it self-detects a missing `hiloop`).
      - name: Install hiloop CLI (best-effort)
        continue-on-error: true
        run: |
          curl -fsSL https://hiloop.ai/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check skills
        run: ./scripts/check-skills.sh

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check-skills
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Publish tagged release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if ! printf '%s\n' "$version" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "VERSION must be a semantic version tag (vMAJOR.MINOR.PATCH)" >&2
            exit 1
          fi

          if ! git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null 2>&1; then
            git tag "$version"
            git push origin "refs/tags/$version"
          fi

          archive="hiloop-skills-$version.tar.gz"
          git archive --format=tar --prefix="hiloop-skills-$version/" "$version" | gzip -n > "$archive"
          sha256sum "$archive" > "$archive.sha256"

          if ! gh release view "$version" >/dev/null 2>&1; then
            gh release create "$version" "$archive" "$archive.sha256" \
              --title "hiloop skills $version" \
              --notes "Verified Agent Skills bundle for hiloop CLI installers."
          fi
